# Conda 环境：AIma
# 创建：conda env create -f environment.yml
# 更新：conda env update -f environment.yml
# 激活：conda activate aima
name: aima
channels:
  - conda-forge
dependencies:
  - python>=3.10,<3.14
  - pip
  - pip:
      - httpx>=0.27
      - pillow>=10.0
      - prompt-toolkit>=3.0
      - pytest>=7
      - python-dotenv>=1.0
      - pyyaml>=6.0
      - questionary>=2.0
      - rich>=14.2
      - ruff>=0.3
      - textual>=8.2
      - wcwidth>=0.2
