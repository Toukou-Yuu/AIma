# 实时观战 + 记录配置（推荐用于正式对局）
# 用法: python -m llm --config configs/watch_mode.yaml

match:
  seed: 42
  max_player_steps: 500

llm:
  timeout_sec: 120
  max_tokens: 1024
  request_delay: 0.5
  max_history_rounds: 10
  clear_history_per_hand: false

logging:
  session: ""           # 自动生成时间戳文件名
  json: null
  session_audit: true   # 启用审计日志

watch:
  enabled: true
  delay: 0.5
  show_reason: true     # 显示 AI 思考理由

debug:
  verbose: false
  dry_run: false
