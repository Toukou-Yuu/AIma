# 实时观战 + 记录配置（推荐用于正式对局）
# 用法: python -m llm --config configs/watch_mode.yaml
#
# 注意：LLM 配置请在 aima_kernel.yaml 中设置

match:
  seed: 42
  max_player_steps: 500

logging:
  session: ""           # 自动生成时间戳文件名
  session_audit: true   # 启用审计日志

watch:
  enabled: true
  delay: 0.5
  show_reason: true     # 显示 AI 思考理由

debug:
  verbose: false
  dry_run: false
