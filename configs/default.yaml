# AIma LLM 对局配置（完整参考模板）
# 用法: python -m llm --config configs/watch_mode.yaml  （推荐）
#       python -m llm --config configs/quick_test.yaml   （快速测试）
#
# 注意：LLM 配置请在 aima_kernel.yaml 中设置

# ==================== 对局基本设置 ====================
match:
  # 洗牌种子，整数（0 ~ 2^31-1）
  seed: 42

  # 最大玩家决策步数（不含局间洗牌和自动过），正整数
  max_player_steps: 500

# ==================== 日志设置 ====================
logging:
  # 会话日志文件名，可选以下值:
  # - null: 不生成会话日志
  # - "": 空字符串，自动生成时间戳文件名
  # - "自定义名称": 使用指定名称
  session: ""

  # 是否启用审计日志
  session_audit: true

# ==================== 实时观战设置 ====================
watch:
  # 是否启用 Rich 实时终端观战
  enabled: true

  # 观战每步间隔（秒）
  delay: 0.5

  # 是否显示 AI 决策理由
  show_reason: true

# ==================== 调试选项 ====================
debug:
  # 详细模式
  verbose: false

  # Dry-run 模式（不调用 API）
  dry_run: false
