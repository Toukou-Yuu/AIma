# 快速测试配置（Dry-run，无 API 调用）
# 用法: python -m llm --config configs/quick_test.yaml
#
# 注意：LLM 配置请在 aima_kernel.yaml 中设置

match:
  seed: 0
  max_player_steps: 100

logging:
  session: null
  session_audit: false

watch:
  enabled: true
  delay: 0.1
  show_reason: false

debug:
  verbose: false
  dry_run: true
