# AIma 对局配置模板（完整参考）
# 用法:
#   python -m llm --config configs/template.yaml
#
# 复制并修改此文件以创建自定义配置

# ==================== 对局基本设置 ====================
match:
  # 洗牌种子，整数（0 ~ 2^31-1）
  seed: 42

  # 最大玩家决策步数（已废弃，使用 match_end 替代）
  # max_player_steps: 500

  # 对局结束条件
  match_end:
    type: hands        # 局数制
    value: 8           # 半庄=8局，东风战=4局
    allow_negative: false  # 有人负分时提前结束

  # 指定对战玩家（可选）
  # 不指定则使用 aima_kernel.yaml 中的默认玩家
  players:
    - id: ichihime
      seat: 0
    - id: yui
      seat: 1
    - id: kavi
      seat: 2
    - id: kana
      seat: 3

# ==================== LLM 运行时设置 ====================
llm:
  # Prompt 格式
  prompt_format: natural

  # 本地上下文边界
  context_scope: per_hand

  # 历史压缩级别
  compression_level: collapse

  # 历史预算
  history_budget: 10

  # Prompt 输入预算
  context_budget_tokens: 8192
  reserved_output_tokens: 1024
  safety_margin_tokens: 512

  # 每次请求间隔（秒）
  request_delay: 0.5

  # 对话日志
  conversation_logging:
    enabled: false

  # 系统提示词
  system_prompt: |
    你是日式麻将（立直麻将）的牌手代理。你只能从当前提示给出的合法动作中精确选择一条执行。
    仅输出一行 JSON 对象，禁止 markdown 代码块，禁止 JSON 以外的文字。
    JSON 必须包含 why 字段，说明为何选这一手（不超过40字）。
    natural 模式输出 action 字段，必须与【可选动作】中的某一项完全一致。
    json 模式输出动作字段，必须与 legal_actions 中某一项完全一致。

  # LLM 连接 profiles
  profiles:
    default:
      provider: openai
      api_key: "your-api-key-here"
      base_url: "https://api.openai.com/v1"
      model: "gpt-4o-mini"
      timeout_sec: 120
      max_tokens: 1024

  # 四席到 profile 的绑定
  seats:
    seat0:
      profile: default
    seat1:
      profile: default
    seat2:
      profile: default
    seat3:
      profile: default

# ==================== 日志设置 ====================
logging:
  json: null

  # 会话日志文件名：null(不生成)、""(自动生成)、"自定义名称"
  session: null

  # 是否启用审计日志
  session_audit: false

  level: "INFO"
  file_output: true
  log_dir: "logs"

# ==================== 实时观战设置 ====================
watch:
  # 是否启用 Rich 实时终端观战
  enabled: false

  # 观战每步间隔（秒）
  delay: 0.3

  # 是否显示 AI 决策理由
  show_reason: true

# ==================== 调试选项 ====================
debug:
  # 详细模式
  verbose: false

  # Dry-run 模式（不调用 API，使用随机动作）
  dry_run: false
