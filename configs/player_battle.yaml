# 多玩家对战配置示例
# 用法: python -m llm --config configs/player_battle.yaml
#
# 配置优先级：本文件 > aima_kernel.yaml 中的座位配置 > aima_kernel.yaml 全局配置

# ==================== 对局基本设置 ====================
match:
  seed: 42
  max_player_steps: 500
  # 指定对战玩家（座位 0-3）：四位 Phase 2 创建的 Bot
  players:
    - id: ichihime
      seat: 0
    - id: yui
      seat: 1
    - id: kavi
      seat: 2
    - id: kana
      seat: 3

# ==================== LLM 对局特定覆盖（可选） ====================
# 以下配置会覆盖 aima_kernel.yaml 中的对应值
# 如不需要覆盖，可删除整个 llm 节或注释其中部分项
llm:
  # timeout_sec: 300      # 对局特定超时（秒），覆盖内核配置
  # max_tokens: 2048      # 对局特定最大输出 token，覆盖内核配置
  request_delay: 0.5      # 请求间隔（秒）
  # history_budget: 10       # 覆盖历史预算
  # context_scope: per_match # 覆盖上下文边界
  # compression_level: collapse

# ==================== 实时观战设置 ====================
watch:
  enabled: true
  delay: 0.5              # 观战延迟（秒）
  show_reason: true       # 显示决策理由

# ==================== 日志设置 ====================
logging:
  session: ""             # 生成时间戳命名的日志
  session_audit: true

# ==================== 调试选项 ====================
debug:
  verbose: false
  dry_run: false
