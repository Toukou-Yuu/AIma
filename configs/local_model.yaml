# 本地大模型测试配置
# 用法: python -m llm --config configs/local_model.yaml
#
# 注意：LLM 配置请在 aima_kernel.yaml 中设置（base_url 指向本地服务）

match:
  seed: 42
  max_player_steps: 20

logging:
  session: "local_test"
  session_audit: true

watch:
  enabled: true
  delay: 1.0
  show_reason: true

debug:
  verbose: true
  dry_run: false
