# AIma 核心配置模板
# 用法：
#   1. 复制本文件为 aima_kernel.yaml
#   2. 填入你的 API Key
#   3. 运行：python -m llm --config configs/aima_kernel.yaml
#
# 注意：aima_kernel.yaml 已被 gitignore，不会提交到仓库

# ==================== LLM 服务配置 ====================
llm:
  # 服务提供商：openai 或 anthropic
  provider: openai

  # Prompt 格式选择：natural（中文自然语言）或 json（结构化）
  # natural：始终使用自然语言观测，不再在局中切换为 delta JSON
  # json：使用结构化观测，可配合 delta 帧减少上下文体积
  prompt_format: natural

  # AIma 本地上下文边界：
  # - stateless：只发送当前观测，不注入历史
  # - per_hand：注入本局历史（默认，推荐）
  # - per_match：注入本场前情摘要 + 本局历史
  context_scope: per_hand

  # 历史压缩策略：
  # - none：不压缩
  # - snip：仅裁掉较早记录
  # - micro：裁掉较早记录并压缩单条历史
  # - collapse：折叠较早记录为摘要（默认）
  # - autocompact：高密度折叠较早历史
  compression_level: collapse

  # 历史预算：控制发送给模型的历史窗口大小
  history_budget: 10

  # Prompt 预算：使用经验公式估算 token 并驱动压缩边界
  context_budget_tokens: 8192
  reserved_output_tokens: 1024
  safety_margin_tokens: 512

  # 请求间隔（秒）
  request_delay: 0.5

  # API 配置
  api_key: "your-api-key-here"  # 必填：填入你的 API Key
  base_url: "https://api.openai.com/v1"  # OpenAI 官方地址
  # base_url: "http://localhost:11434/v1"  # Ollama 本地地址
  # base_url: "https://api.deepseek.com/v1"  # DeepSeek

  # 模型名称
  model: "gpt-4o-mini"
  # model: "deepseek-chat"
  # model: "claude-3-5-sonnet-20241022"

  # 请求参数
  timeout_sec: 120.0
  max_tokens: 1024

  # 系统提示词（通用规则，具体格式示例由 user prompt 提供）
  # 注意：prompt_format 决定 user prompt 的格式：
  # - natural：中文自然语言描述，输出 {"action":"打三万","why":"..."}
  # - json：编码格式，输出 {"kind":"discard","seat":0,"tile":"3m","why":"..."}
  system_prompt: |
    你是日式麻将（立直麻将）的牌手代理。你只能从给出的 legal_actions 中**精确选择一条**执行。

    【核心目标】
    分析手牌结构，计算向听数和进张面，选择能最快接近听牌的行动。

    【牌面编码说明】
    - 万子：1m-9m（如 1m=一万，5m=五万）
    - 筒子：1p-9p（如 1p=一筒，5p=五筒）
    - 索子：1s-9s（如 1s=一索，5s=五索）
    - 字牌：1z=东，2z=南，3z=西，4z=北，5z=白，6z=发，7z=中

    【输出规则】
    - 仅输出一行 JSON 对象，禁止 markdown 代码块，禁止 JSON 以外的文字
    - JSON 必须包含字符串字段 ``why``：说明为何选这一手（不超过40字）
    - 动作字段必须与 legal_actions 中某一项完全一致

  # 对话日志配置（用于调试 LLM 上下文）
  conversation_logging:
    enabled: false  # 是否启用对话日志记录
    # 启用后会在 configs/players/{player_id}/conversations/ 下生成 Markdown 文件
    # 文件命名格式：{YYYYMMDD}-{conversation_id}.md
    # 内容格式：类似网页聊天的一问一答（System/User/Assistant）
    # 支持实时查看：tail -f configs/players/{player_id}/conversations/*.md
    # 注意：仅记录真实 AI 对局（dry-run/fallback 不记录）

  # 多席独立配置（可选）
  # 如果不配置，所有座位使用上方默认配置
  seats:
    # seat0:  # 东
    #   api_key: "seat0-specific-key"
    #   model: "gpt-4o"
    # seat1:  # 南
    #   model: "gpt-4o-mini"

# ==================== 默认玩家配置 ====================
# 当不指定 --players 时使用的默认玩家
players:
  - id: ichihime
    seat: 0
  - id: yui
    seat: 1
  - id: kavi
    seat: 2
  - id: kana
    seat: 3

# ==================== 日志配置 ====================
logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # 是否写入文件
  file_output: true

  # 日志目录
  log_dir: "logs"

  # 对局日志输出
  json: null
  session: null
  session_audit: false

# ==================== 对局默认设置 ====================
match:
  seed: 42
  match_end:
    type: hands
    value: 8
    allow_negative: false

# ==================== 观战设置 ====================
watch:
  enabled: false
  delay: 0.3
  show_reason: true

# ==================== 调试选项 ====================
debug:
  verbose: false
  dry_run: false
