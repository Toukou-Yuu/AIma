# AIma 核心配置模板
# 用法：
#   1. 复制本文件为 aima_kernel.yaml
#   2. 填入你的 API Key
#   3. 运行：python -m llm --kernel-config configs/aima_kernel.yaml
#
# 注意：aima_kernel.yaml 已被 gitignore，不会提交到仓库

# ==================== LLM 服务配置 ====================
llm:
  # 服务提供商：openai 或 anthropic
  provider: openai

  # API 配置
  api_key: "your-api-key-here"  # 必填：填入你的 API Key
  base_url: "https://api.openai.com/v1"  # OpenAI 官方地址
  # base_url: "http://localhost:11434/v1"  # Ollama 本地地址
  # base_url: "https://api.deepseek.com/v1"  # DeepSeek

  # 模型名称
  model: "gpt-4o-mini"
  # model: "deepseek-chat"
  # model: "claude-3-5-sonnet-20241022"

  # 请求参数
  timeout_sec: 120.0
  max_tokens: 1024

  # 系统提示词（可自定义）
  system_prompt: |
    你是日式麻将（立直麻将）的牌手代理。你只能从给出的 legal_actions 中**精确选择一条**执行。

    【牌面编码说明】
    - 万子：1m-9m（如 1m=一万，5m=五万）
    - 筒子：1p-9p（如 1p=一筒，5p=五筒）
    - 索子：1s-9s（如 1s=一索，5s=五索）
    - 字牌：1z=東，2z=南，3z=西，4z=北，5z=白，6z=發，7z=中

    输出要求：仅输出一行 JSON 对象，不要 markdown 代码块，不要 JSON 以外的文字。
    JSON 中除下列动作字段外，**必须**包含字符串字段 ``why``：用符合你人设的语气说明**为何**选这一手（不超过40字）。
    **重要**：`why` 字段必须体现你的人设性格，用角色特有的说话方式，禁止机械分析。
    动作字段必须与所选 legal_actions 中某一项完全一致（含 kind、seat；discard 须含 tile；需要时含 declare_riichi、meld）。
    示例：{"kind":"discard","seat":0,"tile":"3m","why":"现物且维持一向听"}
    示例：{"kind":"pass_call","seat":1,"why":"无役无法荣和"}

  # 多席独立配置（可选）
  # 如果不配置，所有座位使用上方默认配置
  seats:
    # seat0:  # 东
    #   api_key: "seat0-specific-key"
    #   model: "gpt-4o"
    # seat1:  # 南
    #   model: "gpt-4o-mini"

# ==================== 默认玩家配置 ====================
# 当不指定 --players 时使用的默认玩家
players:
  - id: ichihime
    seat: 0
  - id: yui
    seat: 1
  - id: kavi
    seat: 2
  - id: kana
    seat: 3

# ==================== 日志配置 ====================
logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # 是否写入文件
  file_output: true

  # 日志目录
  log_dir: "logs"
