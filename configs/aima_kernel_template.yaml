# AIma 核心配置模板
# 用法：
#   1. 复制本文件为 aima_kernel.yaml
#   2. 填入你的 API Key
#   3. 运行：python -m llm --kernel-config configs/aima_kernel.yaml
#
# 注意：aima_kernel.yaml 已被 gitignore，不会提交到仓库

# ==================== LLM 服务配置 ====================
llm:
  # 服务提供商：openai 或 anthropic
  provider: openai

  # API 配置
  api_key: "your-api-key-here"  # 必填：填入你的 API Key
  base_url: "https://api.openai.com/v1"  # OpenAI 官方地址
  # base_url: "http://localhost:11434/v1"  # Ollama 本地地址
  # base_url: "https://api.deepseek.com/v1"  # DeepSeek

  # 模型名称
  model: "gpt-4o-mini"
  # model: "deepseek-chat"
  # model: "claude-3-5-sonnet-20241022"

  # 请求参数
  timeout_sec: 120.0
  max_tokens: 1024

  # 系统提示词（可自定义）
  system_prompt: |
    你是日式麻将（立直麻将）的牌手代理。

    【核心目标】
    分析手牌结构，计算向听数和进张面，选择能最快接近听牌的行动。

    【牌面规则】
    - 万子：一万~九万（数字牌）
    - 筒子：一筒~九筒（数字牌）
    - 索子：一索~九索（数字牌）
    - 字牌：东、南、西、北、白、发、中
    - 赤宝牌：五万(赤)、五筒(赤)、五索(赤)

    【输出要求】
    仅输出一行 JSON，不要 markdown 代码块。
    格式: {"action": "动作描述", "why": "理由（不超过30字）"}
    示例: {"action": "打三万", "why": "孤立牌，进张面窄"}
    示例: {"action": "打三万并立直", "why": "听牌，立直增加收益"}
    示例: {"action": "过", "why": "无役无法荣和"}

  # 对话日志配置（用于调试 LLM 上下文）
  conversation_logging:
    enabled: false  # 是否启用对话日志记录
    # 启用后会在 configs/players/{player_id}/conversations/ 下生成 Markdown 文件
    # 文件命名格式：{YYYYMMDD}-{session_id}.md
    # 内容格式：类似网页聊天的一问一答（System/User/Assistant）
    # 支持实时查看：tail -f configs/players/{player_id}/conversations/*.md
    # 注意：仅记录真实 AI 对局（dry-run/fallback 不记录）

  # 多席独立配置（可选）
  # 如果不配置，所有座位使用上方默认配置
  seats:
    # seat0:  # 东
    #   api_key: "seat0-specific-key"
    #   model: "gpt-4o"
    # seat1:  # 南
    #   model: "gpt-4o-mini"

# ==================== 默认玩家配置 ====================
# 当不指定 --players 时使用的默认玩家
players:
  - id: ichihime
    seat: 0
  - id: yui
    seat: 1
  - id: kavi
    seat: 2
  - id: kana
    seat: 3

# ==================== 日志配置 ====================
logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # 是否写入文件
  file_output: true

  # 日志目录
  log_dir: "logs"
